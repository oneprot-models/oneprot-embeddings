model:
  name: default
  ckpt_path: null
  config_path: null
  _target_: src.models.oneprot_module.OneProtLitModule
  optimizer:
    _target_: torch.optim.Adam
    _partial_: true
    lr: 0.001
    weight_decay: 0.0
  components:
    sequence:
      _target_: src.models.components.sequence_encoder.SequenceEncoder
      model_name_or_path: facebook/esm2_t33_650M_UR50D
      pooling_type: mean
      output_dim: 1024
      proj_type: mlp
      use_lora: false
      lora_r: 16
      lora_alpha: 16
      lora_dropout: 0.1
      lora_target_modules:
      - query
      - key
      - value
      frozen: true
      use_logit_scale: false
      learnable_logit_scale: false
    struct_token:
      _target_: src.models.components.struct_token_encoder.StructTokenEncoder
      model_name_or_path: facebook/esm2_t12_35M_UR50D
      output_dim: ${..sequence.output_dim}
      pooling_type: mean
      proj_type: linear
      use_logit_scale: true
      learnable_logit_scale: false
    struct_graph:
      _target_: src.models.components.struct_graph_encoder.StructEncoder
      encoder:
        _target_: dig.threedgraph.method.ProNet
        level: backbone
        out_channels: ${..output_dim}
        euler_noise: true
        data_augment_eachlayer: true
        dropout: 0.25
      output_dim: ${..sequence.output_dim}
      proj_type: linear
      use_logit_scale: true
      learnable_logit_scale: false
    pocket:
      _target_: src.models.components.struct_graph_encoder.StructEncoder
      encoder:
        _target_: dig.threedgraph.method.ProNet
        level: backbone
        out_channels: ${..output_dim}
        euler_noise: true
        data_augment_eachlayer: true
        dropout: 0.25
      output_dim: ${..sequence.output_dim}
      proj_type: linear
      use_logit_scale: true
      learnable_logit_scale: false
    text:
      _target_: src.models.components.text_encoder.TextEncoder
      model_name_or_path: microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext
      output_dim: ${..sequence.output_dim}
      pooling_type: cls
      proj_type: mlp
      use_lora: false
      lora_r: 8
      lora_alpha: 8
      lora_dropout: 0.1
      lora_target_modules:
      - query
      - key
      - value
      frozen: true
      use_logit_scale: true
      learnable_logit_scale: false
  loss_fn: CLIP
  local_loss: true
  gather_with_grad: true
  use_l1_regularization: true
  train_on_all_modalities_after_step: 0
esm_model: facebook/esm2_t33_650M_UR50D
tokenizer_name: facebook/esm2_t33_650M_UR50D
saprot_model: westlake-repl/SaProt_650M_AF2
output_dir: /p/data1/bio-ai/bazarova1/embeddings/{model_name}
batch_size: 1
num_workers: 4
num_gpus: 4
num_nodes: 2
single_batch_mode: false
models:
- name: oneprot_struct_graph_text_32900
  ckpt_path: /p/scratch/hai_oneprot/checkpoints_140325/manual_ckpts/2025-03-19__08:14:16/epoch_003_01900-v5.ckpt
  config_path: /p/project1/hai_oneprot/bazarova1/oneprot-panda/logs/train/runs/2025-03-19_08-45-31/config.yaml
- name: oneprot_full_allatom_no_seqsim_no_l1_A100_32900_sanity
  ckpt_path: /p/scratch/hai_oneprot/checkpoints_refined_111024/2024-11-05_19-20-45/epoch_043_28400.ckpt
  config_path: /p/project1/hai_oneprot/bazarova1/oneprot-panda/logs/train/runs/2025-03-22_11-50-19/config_1.yaml
tasks:
  PL8:
    label_type: multi-label
    csv_files:
    - /p/data1/bio-ai/bazarova1/PL8_train_fixed.csv
    - /p/data1/bio-ai/bazarova1/PL8_valid_fixed.csv
    - /p/data1/bio-ai/bazarova1/PL8_test_fixed.csv
