defaults:
  - _self_
  - model: oneprot

# Default model settings (will be overridden in the loop)
model:
  name: default
  ckpt_path: null
  config_path: null

esm_model: facebook/esm2_t33_650M_UR50D
tokenizer_name: facebook/esm2_t33_650M_UR50D #westlake-repl/SaProt_650M_AF2 #facebook/esm2_t33_650M_UR50D
saprot_model: westlake-repl/SaProt_650M_AF2

# Output directory
#output_dir: "/p/scratch/hai_oneprot/bazarova1/embeddings/{model_name}"
#output_dir: "/p/scratch/hai_profound/bazarova1/embeddings/{model_name}"
output_dir: "/p/data1/bio-ai/bazarova1/embeddings/{model_name}"



# Data processing parameters
batch_size: 1
num_workers: 4

# GPU configuration
num_gpus: 4
num_nodes: 2
single_batch_mode: true

